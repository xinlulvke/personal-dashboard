<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Personal Dashboard</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #2c3e50 0%, #3498db 100%);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.15);
            width: 90%;
            max-width: 500px;
            text-align: center;
        }

        #clock {
            font-size: 3.5rem;
            font-weight: 700;
            margin: 0;
            letter-spacing: -1px;
        }

        #date {
            font-size: 1.1rem;
            opacity: 0.8;
            margin-top: 5px;
            margin-bottom: 25px;
        }

        #greeting {
            font-size: 1.8rem;
            margin-bottom: 20px;
            font-weight: 400;
        }

        /* New Weather Widget Styling */
        .weather-widget {
            background: rgba(255, 255, 255, 0.15);
            padding: 15px;
            border-radius: 16px;
            margin-bottom: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .weather-temp {
            font-size: 2rem;
            font-weight: bold;
        }

        .weather-desc {
            font-size: 1rem;
            opacity: 0.9;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box input {
            width: 80%;
            padding: 12px 20px;
            border: none;
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.2);
            color: #fff;
            font-size: 1rem;
            outline: none;
            transition: background 0.3s;
        }

        .search-box input::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-box input:focus {
            background: rgba(255, 255, 255, 0.3);
        }

        .notepad-area {
            text-align: left;
            background: rgba(0, 0, 0, 0.15);
            padding: 15px;
            border-radius: 12px;
        }

        .notepad-area h3 {
            margin-top: 0;
            font-size: 1rem;
            opacity: 0.9;
        }

        textarea {
            width: 100%;
            height: 100px;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            font-size: 0.95rem;
            outline: none;
            box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="dashboard">
    <h2 id="greeting">Hello!</h2>
    <div id="clock">00:00:00</div>
    <div id="date">Loading date...</div>

    <div class="weather-widget">
        <div>
            <div class="weather-desc" id="weather-status">Fetching local weather...</div>
        </div>
        <div class="weather-temp" id="weather-degree">--°C</div>
    </div>

    <div class="search-box">
        <form action="https://www.google.com/search" method="get">
            <input type="text" name="q" placeholder="Search Google..." autocomplete="off">
        </form>
    </div>

    <div class="notepad-area">
        <h3>Quick Notes (Auto-saves)</h3>
        <textarea id="notepad" placeholder="Type something to remember..."></textarea>
    </div>
</div>

<script>
    // 1. Live Clock & Dynamic Greeting
    function updateDashboard() {
        const now = new Date();
        let hours = now.getHours();
        let minutes = now.getMinutes();
        let seconds = now.getSeconds();
        minutes = minutes < 10 ? '0' + minutes : minutes;
        seconds = seconds < 10 ? '0' + seconds : seconds;
        document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;

        const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
        document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);

        let greeting = "Hello";
        if (hours < 12) greeting = "Good Morning ☀️";
        else if (hours < 18) greeting = "Good Afternoon 🌤️";
        else greeting = "Good Evening 🌙";
        document.getElementById('greeting').textContent = greeting;
    }
    updateDashboard();
    setInterval(updateDashboard, 1000);

    // 2. Persistent Notepad
    const notepad = document.getElementById('notepad');
    const savedNotes = localStorage.getItem('dashboardNotes');
    if (savedNotes) notepad.value = savedNotes;
    notepad.addEventListener('input', () => {
        localStorage.setItem('dashboardNotes', notepad.value);
    });

    // 3. Real Live Weather API Connection
    function getWeather(lat, lon) {
        const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`;

        fetch(url)
            .then(response => response.json())
            .then(data => {
                const temp = Math.round(data.current_weather.temperature);
                const code = data.current_weather.weathercode;
                
                // Map Open-Meteo weather codes to words
                let condition = "Clear Skies ✨";
                if (code >= 1 && code <= 3) condition = "Partly Cloudy 🌤️";
                else if (code >= 45 && code <= 48) condition = "Foggy 🌫️";
                else if (code >= 51 && code <= 67) condition = "Raining 🌧️";
                else if (code >= 71 && code <= 77) condition = "Snowing ❄️";
                else if (code >= 80 && code <= 82) condition = "Rain Showers 🌦️";
                else if (code >= 95) condition = "Thunderstorm ⛈️";

                document.getElementById('weather-degree').textContent = `${temp}°C`;
                document.getElementById('weather-status').textContent = condition;
            })
            .catch(error => {
                document.getElementById('weather-status').textContent = "Weather unavailable";
                console.error("Error fetching weather:", error);
            });
    }

    // Request user's location coordinates safely
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (position) => {
                getWeather(position.coords.latitude, position.coords.longitude);
            },
            () => {
                // Default fallback if user denies location permission (Defaults to London coordinates)
                getWeather(51.5074, -0.1278);
                document.getElementById('weather-status').textContent = "London Weather (Location Denied)";
            }
        );
    } else {
        getWeather(51.5074, -0.1278); // Fallback if browser doesn't support geolocation
    }
</script>

</body>
</html>
